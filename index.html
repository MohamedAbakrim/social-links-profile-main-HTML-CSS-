<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card" role="card">
    <img role="portrait_image" src="assets/images/avatar-jessica.jpeg" alt="Portrait of Jessica Randall">
    <h1 class="title">Jessica Randall</h1>
    <span class="address">London, United Kingdom</span>
    <p class="desc">"Front-end developer and avid reader."</p>
    <div class="buttons">
      <a class="link">GitHub</a>
      <a class="link">Frontend Mentor</a>
      <a class="link">LinkedIn</a>
      <a class="link">Twitter</a>
      <a class="link">Instagram</a>
    </div>
  </main>
  <!-- <footer class="attribution">

    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>
</html>
